  <link rel="stylesheet" href="/css/style.css">
  <script>
    // Redirect to index preserving the repo base path on GitHub Pages
    // e.g. https://user.github.io/repo/anything -> https://user.github.io/repo/
    (function(){
      var seg = window.location.pathname.split('/');
      // If first segment after / is the repo name, keep it
      var base = seg.length > 1 ? '/' + seg[1] + '/' : '/';
      document.write('<base href="' + base + '">');
    })();
  </script>
</head>
