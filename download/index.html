<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download — Free Upload Manager</title>
  <link rel="icon" type="image/png" href="../images/logo.png">
  <link rel="stylesheet" href="../css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
  </style>
</head>
<body class="min-h-screen p-4" x-data="downloadApp()" x-init="init()">

  <div class="text-center mb-1">
    <a href="../index.html" class="inline-flex items-center gap-3 no-underline">
      <img src="../images/logo.png" alt="Free Upload Manager" class="h-12 w-auto">
      <h1 class="text-3xl font-bold mt-1 mb-0 text-foreground">FREE UPLOAD MANAGER</h1>
    </a>
    <p class="mt-0 text-muted-foreground">Fast and reliable file hosting — stored on GitHub.</p>
  </div>

  <div class="text-center mb-4 text-sm">
    <a href="../index.html" class="hover:underline font-medium">Index</a>
    <span class="mx-1">|</span>
    <a href="../settings/index.html" class="hover:underline text-primary">Settings</a>
    <span class="mx-1">|</span>
    <a href="../account/index.html" class="hover:underline text-primary">My Files</a>
    <span class="mx-1">|</span>
    <a href="../help/index.html" class="hover:underline text-primary">Help</a>
  </div>

  <div class="mx-auto max-w-[60rem]">
    <template x-if="error">
      <div class="mt-4 text-sm">
        <p class="text-destructive" x-text="error"></p>
        <a href="../index.html" class="text-primary hover:underline">Upload a new file →</a>
      </div>
    </template>

    <template x-if="!error && file">
      <div class="border border-border rounded-sm p-6 mt-4 max-w-lg">
        <h2 class="text-xl font-bold mb-4 break-all" x-text="file.name"></h2>

        <table class="text-sm mb-5">
          <tbody>
            <tr x-show="file.size">
              <td class="pr-8 text-muted-foreground py-1">File size</td>
              <td class="py-1" x-text="humanSize(file.size)"></td>
            </tr>
            <tr x-show="file.note">
              <td class="pr-8 text-muted-foreground py-1 align-top">Note</td>
              <td class="py-1 break-all" x-text="file.note"></td>
            </tr>
            <tr>
              <td class="pr-8 text-muted-foreground py-1">Hosted on</td>
              <td class="py-1">GitHub</td>
            </tr>
          </tbody>
        </table>

        <!-- Primary download button — direct GitHub link -->
        <a :href="file.url" download
          class="inline-block px-6 py-2 border border-border rounded-sm bg-background hover:bg-muted text-sm cursor-pointer no-underline text-foreground">
          ↓ Download
        </a>

        <!-- Open directly on GitHub as fallback -->
        <div class="mt-3">
          <a :href="file.url" target="_blank" rel="noopener"
            class="inline-block px-6 py-2 border border-border rounded-sm bg-background hover:bg-muted text-sm cursor-pointer no-underline text-foreground">
            ↗ Open on GitHub
          </a>
        </div>

        <p class="text-xs text-muted-foreground mt-5">
          Hosted by Free Upload Manager ·
          <a href="../index.html" class="hover:underline text-primary">Upload your own file</a>
        </p>
      </div>
    </template>
  </div>

  <script>
    function downloadApp() {
      return {
        file : null,
        error: null,

        init() {
          const p    = new URLSearchParams(window.location.search);
          const url  = p.get('url');
          const name = p.get('name');

          if (!url || !name) {
            this.error = 'Invalid download link.';
            return;
          }

          this.file = {
            name: decodeURIComponent(name),
            size: parseInt(p.get('size') || '0', 10),
            note: p.get('note') ? decodeURIComponent(p.get('note')) : null,
            url : url,
          };
          document.title = this.file.name + ' — Free Upload Manager';
        },

        humanSize(b) {
          if (!b) return '0 B';
          const u = ['B','KB','MB','GB','TB'];
          const i = Math.floor(Math.log(b) / Math.log(1024));
          return parseFloat((b / Math.pow(1024, i)).toFixed(2)) + ' ' + u[i];
        },
      };
    }
  </script>
</body>
</html>
